<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conflict Studies & Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SLIDE-OUT SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-circle">CS&amp;I</div>
  </div>
  <ul class="sidebar-nav">
    <li><a href="#" onclick="showView('weeklies'); closeSidebar()">Weeklies</a></li>
    <li><a href="#" onclick="showView('digest'); closeSidebar()">Monthly Digests</a></li>
    <li><a href="#" class="feedback-link">Have Feedback?</a></li>
  </ul>
</nav>

<!-- MAIN LAYOUT -->
<div class="app-shell">

  <!-- HEADER -->
  <header class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
    <div class="topbar-center">
      <a href="/" class="site-title-link"><h1 class="site-title">Conflict Studies and Insights</h1></a>
      <a href="#" class="digest-cta" onclick="showView('digest')">Click here for June's Digest</a>
    </div>
    <div class="topbar-right-spacer"></div>
  </header>

  <!-- THEATRE TABS -->
  <div class="theatre-tabs" id="theatreTabs">
    <button class="theatre-tab active" data-theatre="russia-ukraine" onclick="selectTheatre(this)">Russia–Ukraine</button>
    <button class="theatre-tab" data-theatre="israel-lebanon" onclick="selectTheatre(this)">Israel–Lebanon</button>
    <button class="theatre-tab" data-theatre="israel-gaza" onclick="selectTheatre(this)">Israel–Gaza</button>
    <button class="theatre-tab" data-theatre="israel-us-iran" onclick="selectTheatre(this)">Israel–US–Iran</button>
    <button class="theatre-tab" data-theatre="thailand-cambodia" onclick="selectTheatre(this)">Thailand–Cambodia</button>
  </div>

  <!-- MONTH NAV STRIP (weeklies only) -->
  <div class="month-strip" id="monthStripWrap">
    <ul id="monthStripList">
      <!-- populated by JS -->
    </ul>
  </div>

  <!-- WEEK SELECTOR (weeklies only) -->
  <div class="week-selector-bar" id="weekSelectorWrap">
    <select class="week-selector" id="weekSelector"></select>
  </div>

  <!-- CONFLICT STATUS CHART ACCORDION -->
  <div class="status-bar-wrap" id="statusBarWrap">
    <div class="status-bar" id="statusBar" onclick="toggleStatusChart()">
      <span>Conflict Status Chart</span>
      <span class="status-arrow" id="statusArrow">&#9660;</span>
    </div>
    <div class="status-chart-panel" id="statusChartPanel">
      <div class="status-chart-grid" id="statusChartGrid">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- WEEKLIES VIEW -->
  <div class="content-body" id="weekliesView">
    <!-- MAIN ARTICLE PANEL -->
    <main class="article-panel" id="articlePanel">
      <!-- populated by JS -->
    </main>
  </div>

  <!-- MONTHLY DIGEST VIEW -->
  <div class="digest-view hidden" id="digestView">

    <!-- CAP TABS — same row position as theatre tabs -->
    <div class="theatre-tabs" id="capTabsRow">
      <button class="theatre-tab active" data-cap="manoeuvre"      onclick="selectCap(this)">Manoeuvre</button>
      <button class="theatre-tab"        data-cap="sense-strike"   onclick="selectCap(this)">Sense-Strike</button>
      <button class="theatre-tab"        data-cap="combat-support" onclick="selectCap(this)">Combat Support</button>
      <button class="theatre-tab"        data-cap="expeditionary"  onclick="selectCap(this)">Expeditionary</button>
      <button class="theatre-tab"        data-cap="unmanned"       onclick="selectCap(this)">Unmanned Systems</button>
    </div>

    <!-- WHAT CHANGED BAR — same design as Conflict Status Chart -->
    <div class="status-bar-wrap" id="digestChangedWrap">
      <div class="status-bar" onclick="toggleDigestChanged()">
        <span id="digestChangedLabel">What Changed this Month</span>
        <span class="status-arrow" id="digestChangedArrow">&#9660;</span>
      </div>
      <div class="status-chart-panel" id="digestChangedPanel">
        <div style="padding:16px 24px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; color:#cbd5e1; line-height:1.75;" id="digestChangedBody"></div>
      </div>
    </div>

    <div class="digest-layout">

      <!-- Section nav as horizontal strip -->
      <div class="month-strip digest-sec-strip">
        <ul>
          <li class="active" data-sec="opportunities"   onclick="selectSec(this)">Opportunities</li>
          <li               data-sec="vulnerabilities"  onclick="selectSec(this)">Vulnerabilities</li>
          <li               data-sec="capdevs"          onclick="selectSec(this)">Capability Dev</li>
        </ul>
      </div>

      <!-- RIGHT: Content -->
      <main class="article-panel" id="digestContent">
        <!-- populated by JS -->
      </main>

    </div>
  </div>

</div><!-- end app-shell -->

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
