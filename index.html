<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conflict Studies & Insights</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- SLIDE-OUT SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-circle">CS&amp;I</div>
  </div>
  <ul class="sidebar-nav">
    <li><a href="#" onclick="showView('weeklies'); closeSidebar()">Weeklies</a></li>
    <li><a href="#" onclick="showView('digest'); closeSidebar()">Monthly Digests</a></li>
    <li><a href="#" class="feedback-link">Have Feedback?</a></li>
  </ul>
</nav>

<!-- MAIN LAYOUT -->
<div class="app-shell">

  <!-- HEADER -->
  <header class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">&#9776;</button>
    <div class="topbar-center">
      <a href="/" class="site-title-link"><h1 class="site-title">Conflict Studies and Insights</h1></a>
      <a href="#" class="digest-cta" onclick="showView('digest')">Click here for June's Digest</a>
    </div>
    <div class="topbar-right-spacer"></div>
  </header>

  <!-- THEATRE TABS -->
  <div class="theatre-tabs" id="theatreTabs">
    <button class="theatre-tab active" data-theatre="russia-ukraine" onclick="selectTheatre(this)">Russia–Ukraine</button>
    <button class="theatre-tab" data-theatre="israel-lebanon" onclick="selectTheatre(this)">Israel–Lebanon</button>
    <button class="theatre-tab" data-theatre="israel-gaza" onclick="selectTheatre(this)">Israel–Gaza</button>
    <button class="theatre-tab" data-theatre="israel-us-iran" onclick="selectTheatre(this)">Israel–US–Iran</button>
    <button class="theatre-tab" data-theatre="thailand-cambodia" onclick="selectTheatre(this)">Thailand–Cambodia</button>
  </div>

  <!-- CONFLICT STATUS CHART ACCORDION -->
  <div class="status-bar-wrap" id="statusBarWrap">
    <div class="status-bar" id="statusBar" onclick="toggleStatusChart()">
      <span>Conflict Status Chart</span>
      <span class="status-arrow" id="statusArrow">&#9660;</span>
    </div>
    <div class="status-chart-panel" id="statusChartPanel">
      <div class="status-chart-grid" id="statusChartGrid">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <!-- WEEK SELECTOR (below status chart, weeklies only) -->
  <div class="week-selector-bar" id="weekSelectorWrap">
    <select class="week-selector" id="weekSelector"></select>
  </div>

  <!-- WEEKLIES VIEW -->
  <div class="content-body" id="weekliesView">
    <!-- LEFT: Month nav -->
    <aside class="month-nav">
      <ul>
        <li class="active" onclick="selectMonth(this, 'jun2026')">June 2026</li>
        <li onclick="selectMonth(this, 'may2026')">May 2026</li>
        <li onclick="selectMonth(this, 'apr2026')">April 2026</li>
        <li onclick="selectMonth(this, 'mar2026')">March 2026</li>
      </ul>
    </aside>

    <!-- MAIN ARTICLE PANEL -->
    <main class="article-panel" id="articlePanel">
      <!-- populated by JS -->
    </main>
  </div>

  <!-- MONTHLY DIGEST VIEW -->
  <div class="digest-view hidden" id="digestView">
    <div class="digest-layout">

      <!-- LEFT NAV -->
      <aside class="digest-nav">
        <div class="digest-nav-group">
          <div class="digest-nav-label">Capability</div>
          <button class="cap-tab active" data-cap="manoeuvre"      onclick="selectCap(this)">Manoeuvre</button>
          <button class="cap-tab"        data-cap="sense-strike"   onclick="selectCap(this)">Sense-Strike</button>
          <button class="cap-tab"        data-cap="combat-support" onclick="selectCap(this)">Combat Support</button>
          <button class="cap-tab"        data-cap="expeditionary"  onclick="selectCap(this)">Expeditionary</button>
          <button class="cap-tab"        data-cap="unmanned"       onclick="selectCap(this)">Unmanned Systems</button>
        </div>
        <div class="digest-nav-group" style="margin-top:20px;">
          <div class="digest-nav-label">Section</div>
          <button class="sec-tab active" data-sec="changed"       onclick="selectSec(this)">What Changed</button>
          <button class="sec-tab"        data-sec="opportunities" onclick="selectSec(this)">Opportunities</button>
          <button class="sec-tab"        data-sec="vulnerabilities" onclick="selectSec(this)">Vulnerabilities</button>
          <button class="sec-tab"        data-sec="capdevs"       onclick="selectSec(this)">Capability Dev</button>
        </div>
      </aside>

      <!-- RIGHT CONTENT -->
      <main class="digest-content" id="digestContent">
        <!-- populated by JS -->
      </main>

    </div>
  </div>

</div><!-- end app-shell -->

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
